version: "3.9"

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - D:/ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  ai-service:
    build: .
    container_name: ai-service
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
    restart: unless-stopped