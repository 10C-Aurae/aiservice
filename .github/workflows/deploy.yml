name: Deploy — aiservice → AWS ECS

# Secrets requeridos: AWS_ACCOUNT_ID, AWS_REGION,
#   ECR_REPO_AISERVICE, ECS_CLUSTER, ECS_SERVICE_AISERVICE

on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt -q; fi

      - name: Pytest
        run: |
          if [ -d tests ]; then pytest tests/ -v --tb=short -p no:warnings; else echo "Sin tests"; fi

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configurar AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        id: build
        env:
          ECR_REPO: ${{ secrets.ECR_REPO_AISERVICE }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG -t $ECR_REPO:latest .
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest
          echo "image=$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy a ECS
        env:
          CLUSTER:   ${{ secrets.ECS_CLUSTER }}
          SERVICE:   ${{ secrets.ECS_SERVICE_AISERVICE }}
          REGION:    ${{ secrets.AWS_REGION }}
          NEW_IMAGE: ${{ steps.build.outputs.image }}
          CONTAINER: aiservice
        run: |
          TASK_DEF=$(aws ecs describe-services \
            --cluster $CLUSTER --services $SERVICE \
            --region $REGION \
            --query 'services[0].taskDefinition' --output text)

          NEW_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF" --query 'taskDefinition' | \
            jq --arg IMG "$NEW_IMAGE" --arg C "$CONTAINER" \
            '(.containerDefinitions[] | select(.name == $C)).image = $IMG |
             del(.taskDefinitionArn, .revision, .status,
                 .requiresAttributes, .placementConstraints,
                 .compatibilities, .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --region $REGION --cli-input-json "$NEW_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster $CLUSTER --service $SERVICE \
            --task-definition "$NEW_ARN" \
            --force-new-deployment --region $REGION

          aws ecs wait services-stable \
            --cluster $CLUSTER --services $SERVICE --region $REGION

          echo "Desplegado: $NEW_IMAGE"
